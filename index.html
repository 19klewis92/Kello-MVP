<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kello | 설문조사</title>
  <meta name="description" content="Kello 뷰티 서비스 맞춤 설문조사 - 한국 K-뷰티 최적의 서비스를 추천해드립니다.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <!-- Header: Logo at Top Center -->
    <div class="logo-container">
      <div class="logo-wrapper">
        <div class="logo-text">Kello</div>
        <img src="KH.png" class="waving-hand" alt="Kello Hand">
      </div>
      <div id="logo-tagline" class="logo-tagline">K뷰티의 첫 <span class="highlight">Hello</span></div>
    </div>

    <!-- Survey Screen -->
    <main id="survey-screen" class="screen active">

      <!-- Progress -->
      <div class="progress-wrapper">
        <button id="back-btn" class="back-btn" aria-label="이전으로">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="progress-label" class="progress-label">1 / 4</span>
      </div>

      <!-- Question Container -->
      <div class="question-wrapper">
        <div id="question-body" class="question-body"></div>
      </div>

    </main>

    <!-- Loading Screen -->
    <div id="loading-screen" class="screen">
      <div class="loading-inner">
        <div class="spinner"></div>
        <p class="loading-text">Kello로 뷰티업데이트 중..</p>
      </div>
    </div>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
