<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kello | 설문조사</title>
  <meta name="description" content="Kello 뷰티 서비스 맞춤 설문조사 - 한국 K-뷰티 최적의 서비스를 추천해드립니다.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <!-- Header: Logo at Top Center -->
    <div class="logo-container">
      <div class="logo-wrapper">
        <div class="logo-text">Kello</div>
        <img src="KH.png" class="waving-hand" alt="Kello Hand">
      </div>
      <div id="logo-tagline" class="logo-tagline">
        K뷰티의 첫 Hello
      </div>
    </div>

    <!-- Language Tabs (Icon Style) -->
    <div class="lang-tabs" id="lang-tabs">
      <button class="lang-tab active" data-lang="ko">
        <img src="https://flagcdn.com/w40/kr.png" class="flag" alt="🇰🇷">
        <span class="lang-name">한국어</span>
      </button>
      <button class="lang-tab" data-lang="en">
        <img src="https://flagcdn.com/w40/us.png" class="flag" alt="🇺🇸">
        <span class="lang-name">English</span>
      </button>
      <button class="lang-tab" data-lang="zh">
        <img src="https://flagcdn.com/w40/cn.png" class="flag" alt="🇨🇳">
        <span class="lang-name">中文</span>
      </button>
      <button class="lang-tab" data-lang="ja">
        <img src="https://flagcdn.com/w40/jp.png" class="flag" alt="🇯🇵">
        <span class="lang-name">日本語</span>
      </button>
      <button class="lang-tab" data-lang="vi">
        <img src="https://flagcdn.com/w40/vn.png" class="flag" alt="🇻🇳">
        <span class="lang-name">Tiếng Việt</span>
      </button>
      <button class="lang-tab" data-lang="th">
        <img src="https://flagcdn.com/w40/th.png" class="flag" alt="🇹🇭">
        <span class="lang-name">ภาษาไทย</span>
      </button>
      <button class="lang-tab" data-lang="mn">
        <img src="https://flagcdn.com/w40/mn.png" class="flag" alt="🇲🇳">
        <span class="lang-name">Монгол хэл</span>
      </button>
    </div>

    <!-- Survey Screen -->
    <main id="survey-screen" class="screen active">

      <!-- Question Container -->
      <div class="question-wrapper">
        <div id="question-body" class="question-body"></div>
      </div>

    </main>

    <!-- Loading Screen -->
    <div id="loading-screen" class="screen">
      <div class="loading-inner">
        <div class="spinner"></div>
        <p id="loading-text" class="loading-text">Kello로 뷰티업데이트 중..</p>
      </div>
    </div>

    <!-- Complete Screen -->
    <div id="complete-screen" class="screen">
      <div class="complete-inner">
        <div class="complete-emoji">🎉</div>
        <h2 id="complete-title" class="complete-title">참여해 주셔서 감사합니다!</h2>
        <p id="complete-msg" class="complete-msg">소중한 의견이 Kello 서비스에 반영됩니다.</p>
        <div class="complete-logo">Kello</div>
      </div>
    </div>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
